    // ===== 工具 =====
    function escapeHtml(v = "") {
      return String(v)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }
    function formatDate(v) {
      if (!v) return "-";
      const d = new Date(v);
      if (isNaN(d.getTime())) return "-";
      return d.toLocaleString("zh-TW");
    }
    function toDisplay(v) {
      if (v === null || v === undefined || v === "") return "-";
      if (Array.isArray(v)) return v.join("、");
      return String(v);
    }
    function getServiceText(item) {
      if (item.service === "其他項目") {
        return `其他項目（${item.service_other || "未填"}）`;
      }
      return item.service || "未指定";
    }
function isBlank(v) {
  if (v === null || v === undefined) return true;
  if (Array.isArray(v)) return v.length === 0 || v.every(x => String(x).trim() === "");
  return String(v).trim() === "";
}
    function showToast(message, type = "success") {
      const c = document.getElementById("toast-container");
      const el = document.createElement("div");
      const ok = type === "success";
      const info = type === "info";
      el.className = `${ok ? "bg-[#06C755]" : info ? "bg-theme-brown" : "bg-red-500"} text-white px-5 py-2.5 rounded-full shadow-lg text-sm font-bold opacity-0 -translate-y-2 transition`;
      el.innerHTML = message;
      c.appendChild(el);
      requestAnimationFrame(() => {
        el.classList.remove("opacity-0", "-translate-y-2");
      });
      setTimeout(() => {
        el.classList.add("opacity-0", "-translate-y-2");
        setTimeout(() => el.remove(), 300);
      }, 2200);
    }

      const inactive = "flex-1 py-2.5 rounded-xl text-sm font-bold text-theme-sub hover:bg-white/70 flex items-center justify-center gap-2";

      if (role === "admin") {
        a.className = active; s.className = inactive;
        document.getElementById("password").placeholder = "請輸入管理員密碼";
      } else {
        s.className = active; a.className = inactive;
        document.getElementById("password").placeholder = "請輸入員工密碼";
      }
      document.getElementById("password").value = "";
      lucide.createIcons();
    }

    async function checkSession() {
      const { data: { session } } = await _supabase.auth.getSession();
      if (!session) return;

      const email = session.user?.email || "";
      if (email === ACCOUNTS.admin) currentRole = "admin";
      else if (email === ACCOUNTS.staff) currentRole = "staff";
      else {
        await _supabase.auth.signOut();
        return;
      }
      showDashboard();
    }

async function handleLogin() {
  if (isLoggingIn) return; // 防重複點擊/重複事件
  isLoggingIn = true;

  const btn = document.getElementById("login-btn");
  const pwd = document.getElementById("password").value.trim();
  const email = ACCOUNTS[currentRole];

  if (!pwd) {
    isLoggingIn = false;
    return showToast("請輸入密碼", "error");
  }

  btn.disabled = true;
  btn.textContent = "登入中...";

  try {
    const { error } = await _supabase.auth.signInWithPassword({ email, password: pwd });

    if (error) {
      showToast("密碼錯誤", "error");
      document.getElementById("password").value = "";
      return;
    }

    showToast("登入成功");
    showDashboard();
  } finally {
    btn.disabled = false;
    btn.textContent = "登入系統";
    isLoggingIn = false;
  }
}

    async function handleLogout() {
      await _supabase.auth.signOut();
      location.reload();
    }

function showDashboard() {
  document.getElementById("login-view").classList.add("hidden");
  document.getElementById("dashboard-view").classList.remove("hidden");
  document.getElementById("role-badge").textContent = currentRole === "admin" ? "管理員" : "員工";

  const btnChangePwd = document.getElementById("btn-open-change-pwd");
  if (btnChangePwd) {
    btnChangePwd.classList.toggle("hidden", currentRole !== "admin");
  }

  loadData();
}

    // ===== 資料 =====
    async function loadData() {
      const c = document.getElementById("content-area");
      c.innerHTML = `<div class="text-center py-10 text-theme-sub">載入中...</div>`;

      const { data, error } = await _supabase
        .from("grooming_orders")
        .select("*")
        .order("created_at", { ascending: false });

      if (error) {
        c.innerHTML = `<div class="text-center py-10 text-red-500">${escapeHtml(error.message)}</div>`;
        return;
      }
      fullDataList = data || [];
      renderDataList(fullDataList);
    }

function renderDataList(data) {
  const c = document.getElementById("content-area");
  if (!data?.length) {
    c.innerHTML = `<div class="text-center py-12 text-theme-sub">目前沒有資料</div>`;
    return;
  }

  c.innerHTML = data.map(item => {
    const serviceText = getServiceText(item);
    const risk = item.aggression === "有攻擊性"
      ? `<span class="text-[10px] px-2 py-0.5 rounded bg-red-100 text-red-500 font-bold">有攻擊性</span>`
      : "";

    // ===== 店家備註 =====
    const noteText = String(item.store_note ?? "").trim();
    const hasNote = noteText !== "";
    const noteBadge = hasNote
      ? `<span class="text-[10px] px-2 py-0.5 rounded-full bg-[#EDE9FE] text-[#6D28D9] font-bold border border-[#DDD6FE]">店家備註</span>`
      : "";

    // 備註預覽（改成簡潔一行，不做輸入框樣式）
    const notePreview = hasNote
      ? `<div class="mt-1.5 text-[11px] text-[#6D28D9] leading-relaxed truncate">
           📝 ${escapeHtml(noteText.replace(/\n/g, " "))}
         </div>`
      : "";

    // ===== 照片授權（只認「不願意」）=====
    const photoValue = String(item.photo ?? "").trim();
    const photoDenied = photoValue === "不願意";

    const photoDeniedBadge = photoDenied
      ? `<span class="text-[10px] px-2 py-0.5 rounded-full bg-[#FEE2E2] text-[#B91C1C] font-black border border-[#FCA5A5]">照片不同意</span>`
      : "";

    const leftBorderClass = photoDenied ? "border-l-red-400" : "border-l-transparent";

    return `
      <div onclick="openModal('${escapeHtml(item.id)}')" class="card-panel-soft p-4 cursor-pointer hover:-translate-y-0.5 transition border-l-4 ${leftBorderClass} hover:border-l-theme-brown">
        <div class="flex items-center gap-3">
          <div class="w-11 h-11 rounded-full bg-theme-yellowLight text-theme-brownDeep font-black flex items-center justify-center shrink-0 border border-[#EAD9C9]">
            ${escapeHtml((item.pet_name || "?").slice(0,1))}
          </div>

          <div class="flex-1 min-w-0">
            <div class="flex items-center gap-2 flex-wrap">
              <h3 class="font-black text-theme-text truncate">${escapeHtml(item.pet_name || "未命名毛孩")}</h3>
              <span class="text-xs text-theme-sub truncate">(${escapeHtml(item.owner_name || "-")})</span>
              ${noteBadge}
              ${photoDeniedBadge}
            </div>

            <div class="text-xs text-theme-sub mt-1 truncate">${escapeHtml(serviceText)}｜${escapeHtml(item.owner_phone || "-")}</div>
            <div class="text-[11px] text-theme-sub mt-1">${escapeHtml(formatDate(item.created_at))}</div>
            ${notePreview}
          </div>

          ${risk}
        </div>
      </div>
    `;
  }).join("");

  lucide.createIcons();
}

document.getElementById("search-input").addEventListener("input", (e) => {
  const t = e.target.value.trim().toLowerCase();
  const f = fullDataList.filter(i =>
    (i.pet_name || "").toLowerCase().includes(t) ||
    (i.owner_name || "").toLowerCase().includes(t) ||
    (i.owner_phone || "").toLowerCase().includes(t) ||
    (i.store_note || "").toLowerCase().includes(t)
  );
  renderDataList(f);
});

    // ===== 詳情/編輯 =====
function openModal(id) {
  currentItem = fullDataList.find(i => String(i.id) === String(id));
  if (!currentItem) return;

  document.getElementById("modal-id").textContent = `ID: ${currentItem.id}`;
  document.getElementById("btn-delete").classList.toggle("hidden", currentRole !== "admin");
  document.getElementById("btn-edit").textContent = currentRole === "admin" ? "編輯資料" : "編輯服務";
  document.getElementById("btn-edit").classList.remove("hidden");
  document.getElementById("btn-save").classList.add("hidden");

  const editableSet = currentRole === "admin" ? ADMIN_EDITABLE : STAFF_EDITABLE;

  let html = "";

/* ===== 店家內部備註（放在最頂端）===== */
{
  const noteVal = String(currentItem.store_note ?? "");
  const noteDisplay = noteVal.trim()
    ? escapeHtml(noteVal).replace(/\n/g, "<br>")
    : `<span class="text-theme-sub">尚未填寫</span>`;
  const noteEditable = editableSet.has("store_note");

  html += `
    <div class="card-panel-soft p-4">
      <div class="flex items-center justify-between gap-2 mb-2">
        <div class="flex items-center gap-2">
          <i data-lucide="notebook-pen" class="w-4 h-4 text-theme-brown"></i>
          <span class="text-sm font-extrabold text-theme-text">店家備註</span>
<span class="text-[10px] px-2 py-0.5 rounded-full bg-[#EADBCB] text-[#6B4F3F] border border-[#D8C2AF] font-extrabold tracking-wide">
  僅店家可見
</span>        </div>
<span class="view-mode text-[10px] px-2 py-0.5 rounded-full bg-[#EFE3D6] text-[#7A5B49] border border-[#DDC8B6] font-bold">
  點擊下方「編輯資料」即可備註
</span>
      </div>

      <div class="view-mode text-sm leading-relaxed text-theme-text bg-white border border-[#EAE2D9] rounded-xl px-3 py-2.5 min-h-[44px]">
        ${noteDisplay}
      </div>

      ${noteEditable
        ? `<textarea
            data-key="store_note"
            class="edit-mode hidden input-woof text-sm min-h-[96px]"
            placeholder="輸入店家內部備註..."
          >${escapeHtml(noteVal)}</textarea>`
        : ""
      }
    </div>
  `;
}

  FIELD_GROUPS.forEach(group => {
    let groupRows = "";

    group.fields.forEach(key => {
      const rawVal = currentItem[key];
      const empty = isBlank(rawVal);
      const editable = editableSet.has(key);

      // 空值且不可編輯：直接不顯示
      if (empty && !editable) return;

      const label = FIELD_LABEL[key] || key;
      const val = toDisplay(rawVal);

      // 空值但可編輯：平常隱藏，進入編輯模式再顯示
      const hiddenInView = empty ? "hidden empty-edit-only" : "";

      groupRows += `
        <div class="${["owner_address","preferred_hospital","medical_history","attention_items","pet_personality"].includes(key) ? "sm:col-span-2" : ""} ${hiddenInView}">
          <label class="block text-[11px] text-theme-sub font-bold mb-1">${escapeHtml(label)}</label>
          <div class="view-mode text-sm font-semibold min-h-[22px]">${escapeHtml(val)}</div>
          ${editable
            ? `<textarea data-key="${escapeHtml(key)}" class="edit-mode hidden input-woof text-sm min-h-[42px]">${escapeHtml(rawVal ?? "")}</textarea>`
            : ""
          }
        </div>
      `;
    });

    // 整組都沒資料就不顯示
    if (!groupRows) return;

    html += `
      <div class="card-panel-soft overflow-hidden">
        <div class="px-4 py-2.5 bg-theme-yellowLight border-b border-[#EAD9C9] font-bold text-sm">${group.title}</div>
        <div class="p-4 grid grid-cols-1 sm:grid-cols-2 gap-3">
          ${groupRows}
        </div>
      </div>
    `;
  });

  if (currentItem.signature_url) {
    html += `
      <div class="card-panel-soft p-4">
        <div class="font-bold text-sm mb-2">✍️ 電子簽名</div>
        <div class="bg-white rounded-xl p-3 border border-dashed border-[#EAD9C9] flex justify-center">
          <img src="${escapeHtml(currentItem.signature_url)}" class="max-h-28 object-contain" />
        </div>
      </div>
    `;
  }

  document.getElementById("modal-content").innerHTML = html;
  const modal = document.getElementById("detail-modal");
  const panel = document.getElementById("modal-panel");
  modal.classList.remove("hidden");
  setTimeout(() => {
    modal.classList.remove("opacity-0");
    panel.classList.remove("translate-y-full", "sm:scale-95");

  lucide.createIcons();
}

    function closeModal() {
      const modal = document.getElementById("detail-modal");
      const panel = document.getElementById("modal-panel");
      modal.classList.add("opacity-0");
      panel.classList.add("translate-y-full", "sm:scale-95");
      setTimeout(() => modal.classList.add("hidden"), 220);
    }

function enableEdit() {
  document.querySelectorAll(".view-mode").forEach(el => el.classList.add("hidden"));
  document.querySelectorAll(".edit-mode").forEach(el => el.classList.remove("hidden"));
  document.getElementById("btn-edit").classList.add("hidden");
  document.getElementById("btn-save").classList.remove("hidden");
  showToast(currentRole === "admin" ? "已進入編輯模式" : "員工可編輯服務與店家備註", "info");
  document.querySelectorAll(".empty-edit-only").forEach(el => el.classList.remove("hidden"));
}

async function saveChanges() {
  if (!currentItem) return;

  const inputs = Array.from(document.querySelectorAll(".edit-mode[data-key]"));
  if (!inputs.length) return;

  const updates = {};
  let changed = 0;

  inputs.forEach(el => {
    const key = el.dataset.key;
    const oldVal = String(currentItem[key] ?? "").trim();
    const newVal = String(el.value ?? "").trim();
    if (oldVal !== newVal) {
      updates[key] = newVal;
      changed++;
    }
  });

  if (!changed) {
    showToast("沒有變更", "info");
    openModal(currentItem.id);
    return;
  }

  // 管理員：先二次驗證
  if (currentRole === "admin") {
    pendingAction = "save";
    pendingUpdates = updates;
    showAuthModal("save");
    return;
  }

  // 員工：照原本直接存（只會存可編輯欄位）
  await executeSave(updates);
}

async function requestDelete() {
  if (currentRole !== "admin") return;
  if (!currentItem) return;
  if (!confirm(`確定刪除 ${currentItem.pet_name || "此筆資料"}？`)) return;

  pendingAction = "delete";
  pendingUpdates = null;
  showAuthModal("delete");
}
async function executeSave(updates) {
  const btn = document.getElementById("btn-save");
  if (btn) {
    btn.disabled = true;
    btn.textContent = "儲存中...";
  }

  const { error } = await _supabase
    .from("grooming_orders")
    .update(updates)
    .eq("id", currentItem.id);

  if (btn) {
    btn.disabled = false;
    btn.textContent = "儲存變更";
  }

  if (error) {
    showToast("儲存失敗：" + error.message, "error");
    return;
  }

  showToast("資料已更新");
  closeModal();
  loadData();
}

async function executeDelete() {
  const { error } = await _supabase
    .from("grooming_orders")
    .delete()
    .eq("id", currentItem.id);

  if (error) {
    showToast("刪除失敗：" + error.message, "error");
    return;
  }

  showToast("刪除成功");
  closeModal();
  loadData();
}

function showAuthModal(actionType) {
  if (currentRole !== "admin") return;

  const title = document.getElementById("auth-title");
  const desc = document.getElementById("auth-desc");
  const pwd = document.getElementById("auth-password");

  if (actionType === "save") {
    title.textContent = "修改驗證";
    desc.textContent = "修改資料前，請輸入管理員密碼";
  } else {
    title.textContent = "刪除驗證";
    desc.textContent = "刪除資料前，請輸入管理員密碼";
  }

  pwd.value = "";
  const m = document.getElementById("auth-modal");
  m.classList.remove("hidden");
  setTimeout(() => {
    m.classList.remove("opacity-0");
    pwd.focus();
  }, 10);

  lucide.createIcons();
}

function closeAuthModal() {
  const m = document.getElementById("auth-modal");
  m.classList.add("opacity-0");
  setTimeout(() => m.classList.add("hidden"), 220);

  const btn = document.getElementById("auth-confirm-btn");
  if (btn) {
    btn.disabled = false;
    btn.textContent = "確認";
  }
}

async function handleAuthConfirm() {
  if (currentRole !== "admin") return;

  const pwd = document.getElementById("auth-password").value.trim();
  const btn = document.getElementById("auth-confirm-btn");

  if (!pwd) return showToast("請輸入管理員密碼", "error");

  btn.disabled = true;
  btn.textContent = "驗證中...";

  const { error } = await _supabase.auth.signInWithPassword({
    email: ACCOUNTS.admin,
    password: pwd
  });

  if (error) {
    btn.disabled = false;
    btn.textContent = "確認";
    return showToast("驗證失敗：密碼錯誤", "error");
  }

  closeAuthModal();

  const action = pendingAction;
  const updates = pendingUpdates;

  pendingAction = null;
  pendingUpdates = null;

  if (action === "save" && updates) {
    await executeSave(updates);
    return;
  }

  if (action === "delete") {
    await executeDelete();
    return;
  }
}
function switchChangePwdTab(role) {
  if (currentRole !== "admin") {
    showToast("只有管理員可使用此功能", "error");
    return;
  }

  changePwdTargetRole = role;

  const tabAdmin = document.getElementById("cp-tab-admin");
  const tabStaff = document.getElementById("cp-tab-staff");
  const oldWrap = document.getElementById("cp-old-wrap");
  const oldDivider = document.getElementById("cp-old-divider");
  const oldInput = document.getElementById("cp-old-password");

  const activeClass = "flex-1 py-2 rounded-lg text-sm font-bold bg-[#F8F6F3] text-theme-text border border-[#DED6CE]";
  const inactiveClass = "flex-1 py-2 rounded-lg text-sm font-bold text-theme-sub";

  if (role === "admin") {
    if (tabAdmin) tabAdmin.className = activeClass;
    if (tabStaff) tabStaff.className = inactiveClass;
    if (oldInput) oldInput.placeholder = "請輸入管理員舊密碼";
  } else {
    if (tabStaff) tabStaff.className = activeClass;
    if (tabAdmin) tabAdmin.className = inactiveClass;
    if (oldInput) oldInput.placeholder = "請輸入員工舊密碼";
  }

  // 兩種角色都要輸入舊密碼，所以都顯示
  if (oldWrap) oldWrap.classList.remove("hidden");
  if (oldDivider) oldDivider.classList.remove("hidden");
}

 // ===== 密碼修改（目前登入帳號）=====
function openChangePasswordModal() {
  if (currentRole !== "admin") {
    showToast("只有管理員可變更密碼", "error");
    return;
  }

  document.getElementById("cp-old-password").value = "";
  document.getElementById("cp-new-password").value = "";
  document.getElementById("cp-confirm-password").value = "";

  switchChangePwdTab("admin");

  const m = document.getElementById("change-pwd-modal");
  m.classList.remove("hidden");
  setTimeout(() => m.classList.remove("opacity-0"), 10);
  lucide.createIcons();
}

    function closeChangePasswordModal() {
      const m = document.getElementById("change-pwd-modal");
      m.classList.add("opacity-0");
      setTimeout(() => m.classList.add("hidden"), 220);
    }

async function handleChangePassword() {
  if (currentRole !== "admin") {
    return showToast("只有管理員可變更密碼", "error");
  }

  const oldPwd = document.getElementById("cp-old-password").value.trim();
  const newPwd = document.getElementById("cp-new-password").value.trim();
  const confirmPwd = document.getElementById("cp-confirm-password").value.trim();
  const btn = document.getElementById("btn-change-pwd");

  if (!oldPwd || !newPwd || !confirmPwd) return showToast("請填寫完整", "error");
  if (newPwd.length < 6) return showToast("新密碼至少 6 碼", "error");
  if (newPwd !== confirmPwd) return showToast("新密碼與確認不一致", "error");

  // 再確認目前登入者是 admin
  const loginUser = (await _supabase.auth.getUser()).data.user;
  if (!loginUser?.email || loginUser.email !== ACCOUNTS.admin) {
    return showToast("僅管理員可操作", "error");
  }

  btn.disabled = true;
  btn.textContent = "驗證舊密碼...";

  try {
    const targetEmail = ACCOUNTS[changePwdTargetRole];
    if (!targetEmail) {
      btn.disabled = false;
      btn.textContent = "確認修改";
      return showToast("目標帳號錯誤", "error");
    }

    // 驗證「目標帳號」舊密碼
    const { error: signInError } = await _supabase.auth.signInWithPassword({
      email: targetEmail,
      password: oldPwd
    });

    if (signInError) {
      btn.disabled = false;
      btn.textContent = "確認修改";
      return showToast("舊密碼錯誤", "error");
    }

    // 已切換成目標帳號 session，直接改該帳號密碼
    btn.textContent = "更新中...";
    const { error: updateError } = await _supabase.auth.updateUser({ password: newPwd });
    if (updateError) {
      btn.disabled = false;
      btn.textContent = "確認修改";
      return showToast("修改失敗：" + updateError.message, "error");
    }

    btn.disabled = false;
    btn.textContent = "確認修改";
    showToast(`${changePwdTargetRole === "admin" ? "管理員" : "員工"}密碼修改成功，請重新登入`);
    await _supabase.auth.signOut();
    location.reload();

  } catch (e) {
    btn.disabled = false;
    btn.textContent = "確認修改";
    showToast("操作失敗：" + (e?.message || "未知錯誤"), "error");
  }
}

    // ===== UI events =====
    document.getElementById("detail-modal").addEventListener("click", (e) => {
      if (e.target.id === "detail-modal") closeModal();
    });
    document.getElementById("change-pwd-modal").addEventListener("click", (e) => {
      if (e.target.id === "change-pwd-modal") closeChangePasswordModal();
    });
    document.getElementById("auth-modal").addEventListener("click", (e) => {
  if (e.target.id === "auth-modal") closeAuthModal();
});
// ===== Service Worker 註冊（統一使用 sw.js，避免 scope 衝突）=====
if ("serviceWorker" in navigator) {
  window.addEventListener("load", async () => {
    try {
      const reg = await navigator.serviceWorker.register("./sw.js?v=10");

      reg.addEventListener("updatefound", () => {
        const newWorker = reg.installing;
        if (!newWorker) return;
        newWorker.addEventListener("statechange", () => {
          if (newWorker.state === "installed" && navigator.serviceWorker.controller) {
            newWorker.postMessage({ action: "skipWaiting" });
          }
        });
      });

      navigator.serviceWorker.addEventListener("controllerchange", () => {
        window.location.reload();
      });
    } catch (e) {
      console.error("SW register fail:", e);
    }
  });
}
